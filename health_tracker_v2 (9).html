<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер здоровья</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-sec: #F5F4F0;
    --bg-ter: #EEECEA;
    --text: #1E1D30;
    --text-sec: #7A7870;
    --border: rgba(100,95,180,0.14);
    --border-med: rgba(100,95,180,0.24);
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --teal: #5B57C8;
    --teal-dark: #4A46B0;
    --teal-light: #EFEFF8;
    --teal-text: #2E2A8A;
    --amber-light: #FFF8E0;
    --amber-text: #7A5500;
    --red-light: #FFF0F0;
    --red-text: #C0392B;
    --red-border: #E05A5A;
    --green-light: #F0FBF4;
    --green-text: #2E7D4F;
    --blue-light: #EFEFF8;
    --blue-text: #3D39A0;
    --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #20202C;
      --bg-sec: #28283A;
      --bg-ter: #18181F;
      --text: #EEEEF8;
      --text-sec: #7A7A9A;
      --border: rgba(120,115,210,0.14);
      --border-med: rgba(120,115,210,0.24);
      --teal-light: #1e1e38;
      --teal-text: #9B98F0;
      --amber-light: #3d2c00;
      --amber-text: #FFD080;
      --red-light: #3d1010;
      --red-text: #FF9090;
      --red-border: #FF7070;
      --green-light: #0d2e18;
      --green-text: #90D0A0;
      --blue-light: #1e1e38;
      --blue-text: #9B98F0;
    }
  }

  body { font-family: var(--font); background: var(--bg-ter); color: var(--text); min-height: 100vh; padding: 1rem; }

  /* ── AUTH SCREEN ── */
  .auth-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .auth-box {
    background: var(--bg); border: 0.5px solid var(--border-med);
    border-radius: var(--radius-xl); padding: 2rem; width: 360px; max-width: 100%;
  }
  .auth-logo {
    width: 48px; height: 48px; background: var(--teal); border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 24px; margin: 0 auto 1rem;
  }
  .auth-box h2 { font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 4px; }
  .auth-box p  { font-size: 13px; color: var(--text-sec); text-align: center; margin-bottom: 1.5rem; }
  .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; background: var(--bg-sec); border-radius: var(--radius-md); padding: 3px; margin-bottom: 1.25rem; }
  .auth-tab { padding: 7px; border: none; background: transparent; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 400; color: var(--text-sec); font-family: var(--font); transition: all 0.15s; }
  .auth-tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }
  .auth-error { background: var(--red-light); color: var(--red-text); border-radius: var(--radius-md); padding: 8px 12px; font-size: 13px; margin-bottom: 12px; display: none; }
  .auth-error.show { display: block; }
  .auth-success { background: var(--teal-light); color: var(--teal-text); border-radius: var(--radius-md); padding: 8px 12px; font-size: 13px; margin-bottom: 12px; display: none; }
  .auth-success.show { display: block; }

  /* ── APP ── */
  #app { display: none; }
  .app-wrapper { max-width: 680px; margin: 0 auto; }

  .app-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .app-header-icon { width: 40px; height: 40px; background: var(--teal); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
  .app-header h1 { font-size: 20px; font-weight: 500; }
  .app-header p  { font-size: 13px; color: var(--text-sec); margin-top: 1px; }

  .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; background: var(--bg-sec); border-radius: var(--radius-lg); padding: 4px; margin-bottom: 1.5rem; }
  .tab { padding: 8px 10px; border: none; background: transparent; border-radius: var(--radius-md); cursor: pointer; font-size: 13px; font-weight: 400; color: var(--text-sec); font-family: var(--font); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; }
  .tab.active { background: var(--bg); color: var(--text); font-weight: 500; border: 0.5px solid var(--border); }

  .section { display: none; }
  .section.active { display: block; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 500; }
  .card-sub { font-size: 13px; color: var(--text-sec); margin-top: 3px; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-warn    { background: var(--amber-light); color: var(--amber-text); }
  .badge-ok      { background: var(--green-light); color: var(--green-text); }
  .badge-urgent  { background: var(--red-light); color: var(--red-text); }
  .badge-info    { background: var(--blue-light); color: var(--blue-text); }

  .meta-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-sec); margin-top: 6px; }
  .actions  { display: flex; gap: 6px; }

  .btn-icon {
    background: transparent; border: 0.5px solid var(--border-med); border-radius: var(--radius-md);
    padding: 5px 8px; cursor: pointer; color: var(--text-sec); font-size: 13px;
    display: flex; align-items: center; gap: 4px; transition: background 0.15s; font-family: var(--font);
  }
  .btn-icon:hover { background: var(--bg-sec); }

  .btn-primary {
    background: var(--teal); border: none; border-radius: var(--radius-md);
    padding: 8px 16px; cursor: pointer; color: #fff; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; transition: background 0.15s; font-family: var(--font);
  }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-danger {
    color: var(--red-border); background: transparent; border: 0.5px solid var(--border);
    border-radius: var(--radius-md); padding: 5px 8px; cursor: pointer;
    font-size: 12px; font-family: var(--font); transition: background 0.15s;
  }
  .btn-danger:hover { background: var(--red-light); }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-size: 16px; font-weight: 500; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-xl); border: 0.5px solid var(--border-med); padding: 1.5rem; width: 440px; max-width: 94vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 7px 10px; font-size: 13px; font-family: var(--font);
    background: var(--bg); border: 0.5px solid var(--border-med);
    border-radius: var(--radius-md); color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
  .field textarea { min-height: 64px; resize: vertical; }

  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }

  .reminder-card { display: flex; align-items: center; gap: 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
  .reminder-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ri-urgent { background: var(--red-light); color: var(--red-border); }
  .ri-soon   { background: var(--amber-light); color: var(--amber-text); }
  .ri-ok     { background: var(--teal-light); color: var(--teal-text); }
  .reminder-info { flex: 1; min-width: 0; }
  .reminder-name { font-size: 14px; font-weight: 500; }
  .reminder-sub  { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
  .days-box  { text-align: right; flex-shrink: 0; }
  .days-left { font-size: 22px; font-weight: 500; }
  .days-label{ font-size: 11px; color: var(--text-sec); }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card  { background: var(--bg-sec); border-radius: var(--radius-md); padding: 12px; }
  .stat-num   { font-size: 24px; font-weight: 500; }
  .stat-label { font-size: 12px; color: var(--text-sec); margin-top: 2px; }

  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-sec); margin-bottom: 8px; }
  .section-label.urgent { color: var(--red-border); }
  .section-label.soon   { color: var(--amber-text); }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-sec); font-size: 14px; line-height: 1.6; }
  .empty i { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.5; }

  .card-notes { font-size: 13px; color: var(--text-sec); margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }

  .stars { display: flex; gap: 3px; }
  .star { font-size: 18px; cursor: pointer; color: var(--border-med); transition: color 0.1s; line-height: 1; }
  .star.on  { color: #EF9F27; }
  .star:hover { color: #EF9F27; }

  .hist-card   { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
  .hist-header { display: flex; align-items: flex-start; justify-content: space-between; }
  .hist-name   { font-size: 14px; font-weight: 500; }
  .hist-meta   { font-size: 12px; color: var(--text-sec); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .hist-cost   { font-size: 16px; font-weight: 500; color: var(--teal); white-space: nowrap; }
  .hist-stars  { display: flex; gap: 2px; margin-top: 6px; }
  .hist-star   { font-size: 14px; color: #EF9F27; }
  .hist-star.off { color: var(--border-med); }
  .hist-note   { font-size: 12px; color: var(--text-sec); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }

  .filter-bar  { display: flex; gap: 6px; margin-bottom: 1rem; }
  .filter-btn  { padding: 5px 14px; border: 0.5px solid var(--border-med); border-radius: 20px; background: transparent; font-size: 12px; cursor: pointer; color: var(--text-sec); font-family: var(--font); transition: all 0.15s; }
  .filter-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }
  .total-bar   { display: flex; align-items: center; justify-content: space-between; background: var(--bg-sec); border-radius: var(--radius-md); padding: 10px 16px; margin-bottom: 1rem; font-size: 13px; }
  .total-bar strong { font-size: 18px; color: var(--teal); margin-left: 8px; }
  .btn-done { background: transparent; border: 0.5px solid var(--teal); color: var(--teal); border-radius: var(--radius-md); padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: var(--font); display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; }
  .btn-done:hover { background: var(--teal-light); }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg-ter); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-sec); }

  .user-chip { display: flex; align-items: center; gap: 6px; background: var(--bg-sec); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px 4px 4px; cursor: pointer; font-size: 12px; color: var(--text-sec); }
  .user-avatar { width: 24px; height: 24px; background: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; }

  @media (max-width: 480px) {
    body { padding: 0.75rem; }
    .tab { font-size: 12px; padding: 7px 8px; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .app-header { flex-wrap: wrap; gap: 8px; }
  }
</style>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%234A46B0'/%3E%3Cpath d='M13 30 Q13 20 23 20 Q28 20 32 25 Q36 20 41 20 Q51 20 51 30 Q51 42 32 52 Q13 42 13 30Z' fill='%237B78E0'/%3E%3Cpolyline points='7,31 18,31 24,19 32,43 39,23 45,35 57,35' fill='none' stroke='white' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Загрузка...</div>
</div>

<!-- Auth -->
<div class="auth-wrap" id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo"><i class="ti ti-heart-rate-monitor"></i></div>
    <h2>Трекер здоровья</h2>
    <p>Врачи, анализы и напоминания</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Регистрация</button>
    </div>

    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>

    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@example.com"></div>
    <div id="password-field" class="field"><label>Пароль</label><input id="auth-password" type="password" placeholder="Минимум 6 символов"></div>

    <div id="forgot-link" style="text-align:right;margin-top:-6px;margin-bottom:8px">
      <button onclick="switchAuthTab('reset')" style="background:none;border:none;font-size:12px;color:var(--teal);cursor:pointer;font-family:var(--font);padding:0">Забыли пароль?</button>
    </div>

    <button class="btn-primary" id="auth-btn" onclick="handleAuth()" style="width:100%;justify-content:center;margin-top:4px">
      <i class="ti ti-login"></i> Войти
    </button>

    <div id="google-btn" style="text-align:center;margin-top:14px">
      <button onclick="handleGoogle()" class="btn-icon" style="width:100%;justify-content:center;gap:8px;padding:9px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Войти через Google
      </button>
    </div>
  </div>
</div>

<!-- App -->
<div id="app">
<div class="app-wrapper">
  <div class="app-header">
    <div class="app-header-icon"><i class="ti ti-heart-rate-monitor"></i></div>
    <div style="flex:1">
      <h1>Трекер здоровья</h1>
      <p>Врачи, анализы и напоминания</p>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <div class="user-chip" onclick="signOut()" title="Выйти">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-email-short">...</span>
        <i class="ti ti-logout" style="font-size:13px"></i>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('reminders')"><i class="ti ti-bell"></i> Напоминания</button>
    <button class="tab" onclick="showTab('doctors')"><i class="ti ti-stethoscope"></i> Врачи</button>
    <button class="tab" onclick="showTab('tests')"><i class="ti ti-flask"></i> Анализы</button>
    <button class="tab" onclick="showTab('history')"><i class="ti ti-history"></i> История</button>
  </div>

  <div id="sec-reminders" class="section active"><div id="reminders-content"></div></div>
  <div id="sec-doctors" class="section">
    <div class="top-bar">
      <span class="section-title">Мои врачи</span>
      <button class="btn-primary" onclick="openModal('doctor')"><i class="ti ti-plus"></i> Добавить</button>
    </div>
    <div id="doctors-list"></div>
  </div>
  <div id="sec-tests" class="section">
    <div class="top-bar">
      <span class="section-title">Анализы и осмотры</span>
      <button class="btn-primary" onclick="openModal('test')"><i class="ti ti-plus"></i> Добавить</button>
    </div>
    <div id="tests-list"></div>
  </div>
  <div id="sec-history" class="section">
    <div class="top-bar">
      <span class="section-title">История</span>
      <button class="btn-primary" onclick="openLogModal()"><i class="ti ti-plus"></i> Добавить запись</button>
    </div>
    <div id="history-content"></div>
  </div>
</div>
</div>

<!-- Doctor Modal -->
<div class="modal-overlay" id="modal-doctor">
  <div class="modal">
    <h3 id="doc-modal-title">Добавить врача</h3>
    <div class="field"><label>ФИО врача</label><input id="doc-name" type="text" placeholder="Иванова Мария Петровна"></div>
    <div class="field"><label>Специализация</label><input id="doc-spec" type="text" placeholder="Стоматолог"></div>
    <div class="field"><label>Клиника / Адрес</label><input id="doc-clinic" type="text" placeholder="Клиника Здоровье, ул. Ленина 10"></div>
    <div class="field"><label>Телефон</label><input id="doc-phone" type="text" placeholder="+7 (999) 000-00-00"></div>
    <div class="field"><label>Последний визит</label><input id="doc-last" type="date"></div>
    <div class="field"><label>Запланированный приём <span style="color:var(--teal)">— или первичный</span></label>
      <div style="display:flex;gap:8px">
        <input id="doc-next" type="date" style="flex:1">
        <input id="doc-next-time" type="time" style="width:110px">
      </div>
    </div>
    <div class="field"><label>Место приёма</label><input id="doc-next-place" type="text" placeholder="Клиника, кабинет, адрес..."></div>
    <div class="field"><label>Периодичность визитов</label>
      <select id="doc-freq">
        <option value="">Без повторения</option>
        <option value="30">Ежемесячно</option>
        <option value="90">Раз в 3 месяца</option>
        <option value="180">Раз в полгода</option>
        <option value="365">Раз в год</option>
        <option value="730">Раз в 2 года</option>
      </select>
    </div>
    <div class="field"><label>Заметки</label><textarea id="doc-notes" placeholder="Назначения, рекомендации..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-icon" onclick="closeModal('doctor')">Отмена</button>
      <button class="btn-primary" onclick="saveDoctor()"><i class="ti ti-check"></i> Сохранить</button>
    </div>
  </div>
</div>

<!-- Test Modal -->
<div class="modal-overlay" id="modal-test">
  <div class="modal">
    <h3 id="test-modal-title">Добавить анализ / осмотр</h3>

<script>
// ── Supabase init ─────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://dexcxykzpluwvqojgbgn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_chHg4p1dhWPAVcBIyxZg0A_143FoP5M';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ─────────────────────────────────────────────────────────────────────
let doctors = [], tests = [], history = [];
let editingDocIdx = null, editingTestIdx = null, editingLogIdx = null;
let currentRating = 0, histFilter = 'all';
let completingSrc = null, completeRating = 0;
let currentUser = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (mode === 'login')));
  const btn = document.getElementById('auth-btn');
  const passField = document.getElementById('password-field');
  const forgotLink = document.getElementById('forgot-link');
  const googleBtn = document.getElementById('google-btn');
  const authTabs = document.querySelector('.auth-tabs');
  if (mode === 'reset') {
    btn.innerHTML = '<i class="ti ti-mail"></i> Отправить письмо';
    btn.onclick = handleReset;
    passField.style.display = 'none';
    forgotLink.style.display = 'none';
    if (googleBtn) googleBtn.style.display = 'none';
    authTabs.style.display = 'none';
    if (!document.getElementById('back-to-login')) {
      const back = document.createElement('button');
      back.id = 'back-to-login';
      back.style = 'background:none;border:none;font-size:13px;color:var(--teal);cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px;padding:0;margin-bottom:12px';
      back.innerHTML = '<i class="ti ti-arrow-left" style="font-size:14px"></i> Вернуться ко входу';
      back.onclick = () => switchAuthTab('login');
      document.getElementById('auth-error').before(back);
    }
    document.getElementById('back-to-login').style.display = 'flex';
  } else {
    btn.innerHTML = mode === 'login' ? '<i class="ti ti-login"></i> Войти' : '<i class="ti ti-user-plus"></i> Зарегистрироваться';
    btn.onclick = handleAuth;
    passField.style.display = '';
    forgotLink.style.display = mode === 'login' ? '' : 'none';
    if (googleBtn) googleBtn.style.display = '';
    authTabs.style.display = '';
    const back = document.getElementById('back-to-login');
    if (back) back.style.display = 'none';
  }
  clearAuthMessages();
}

function clearAuthMessages() {
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('auth-success').classList.remove('show');
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
}
function showAuthSuccess(msg) {
  const el = document.getElementById('auth-success');
  el.textContent = msg; el.classList.add('show');
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  clearAuthMessages();

  if (!email || !password) { showAuthError('Введите email и пароль'); return; }

  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i> Подождите...';

  try {
    if (authMode === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      showAuthSuccess('Письмо с подтверждением отправлено на ' + email);
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-user-plus"></i> Зарегистрироваться';
      return;
    }
  } catch(e) {
    const msgs = {
      'Invalid login credentials': 'Неверный email или пароль',
      'Email not confirmed': 'Подтвердите email — мы отправили письмо',
      'User already registered': 'Этот email уже зарегистрирован',
    };
    showAuthError(msgs[e.message] || e.message);
    btn.disabled = false;
    btn.innerHTML = authMode === 'login' ? '<i class="ti ti-login"></i> Войти' : '<i class="ti ti-user-plus"></i> Зарегистрироваться';
  }
}

async function handleGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
}

async function handleReset() {
  const email = document.getElementById('auth-email').value.trim();
  clearAuthMessages();
  if (!email) { showAuthError('Введите email для восстановления'); return; }
  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i> Отправляем...';
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
    if (error) throw error;
    showAuthSuccess('Письмо с ссылкой для сброса пароля отправлено на ' + email);
  } catch(e) {
    showAuthError(e.message || 'Что-то пошло не так');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-mail"></i> Отправить письмо';
}

async function saveNewPassword() {
  const pass = document.getElementById('new-password').value;
  const confirm = document.getElementById('new-password-confirm').value;
  const errEl = document.getElementById('new-pass-error');
  const sucEl = document.getElementById('new-pass-success');
  errEl.classList.remove('show'); sucEl.classList.remove('show');
  if (!pass || pass.length < 6) { errEl.textContent = 'Пароль должен быть минимум 6 символов'; errEl.classList.add('show'); return; }
  if (pass !== confirm) { errEl.textContent = 'Пароли не совпадают'; errEl.classList.add('show'); return; }
  const btn = document.getElementById('new-pass-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i> Сохраняем...';
  try {
    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) throw error;
    sucEl.textContent = 'Пароль успешно изменён! Входим...';
    sucEl.classList.add('show');
    setTimeout(() => {
      document.getElementById('modal-new-password').style.display = 'none';
    }, 1500);
  } catch(e) {
    errEl.textContent = e.message || 'Что-то пошло не так';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-check"></i> Сохранить пароль';
  }
}

async function signOut() {
  if (!confirm('Выйти из аккаунта?')) return;
  await sb.auth.signOut();
}

// ── Session listener ──────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  clearTimeout(loadingTimeout);
  if (event === 'PASSWORD_RECOVERY') {
    hideLoading();
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'none';
    const modal = document.getElementById('modal-new-password');
    modal.style.display = 'flex';
    return;
  }
  if (session?.user) {
    currentUser = session.user;
    const email = currentUser.email || '';
    document.getElementById('user-avatar').textContent = email[0].toUpperCase();
    document.getElementById('user-email-short').textContent = email.split('@')[0];
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    try {
      await loadData();
    } catch(e) {
      console.error('Ошибка загрузки данных:', e);
    } finally {
      hideLoading();
    }
  } else {
    currentUser = null;
    hideLoading();
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

// Страховка: если Supabase не ответил за 8 секунд — показываем экран входа
const loadingTimeout = setTimeout(() => {
  if (!document.getElementById('loading').classList.contains('hidden')) {
    hideLoading();
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
}, 8000);

// ── Data: load from Supabase ──────────────────────────────────────────────────
async function loadData() {
  const uid = currentUser.id;

  const [{ data: d, error: e1 }, { data: t, error: e2 }, { data: h, error: e3 }] = await Promise.all([
    sb.from('doctors').select('*').eq('user_id', uid).order('created_at'),
    sb.from('tests').select('*').eq('user_id', uid).order('created_at'),
    sb.from('history').select('*').eq('user_id', uid).order('created_at'),
  ]);
  if (e1 || e2 || e3) console.error('Supabase ошибки:', e1, e2, e3);

  // Map DB rows → app objects
  doctors = (d || []).map(r => ({
    _id: r.id, name: r.name, spec: r.spec, clinic: r.clinic, phone: r.phone,
    last: r.last_visit, next: r.next_visit, next_time: r.next_time,
    next_place: r.next_place, freq: r.freq ? String(r.freq) : '', notes: r.notes
  }));

  tests = (t || []).map(r => ({
    _id: r.id, name: r.name, cat: r.cat, date: r.date,
    next: r.next_date, next_time: r.next_time, next_place: r.next_place,
    result: r.result, freq: r.freq ? String(r.freq) : '', notes: r.notes
  }));

  history = (h || []).map(r => ({
    _id: r.id, type: r.type, name: r.name, sub: r.sub,
    date: r.date, cost: r.cost, rating: r.rating, notes: r.notes
  }));

  render();
}

// ── Data: save ────────────────────────────────────────────────────────────────
async function saveDoctor() {

    name,

    clinic:     document.getElementById('doc-clinic').value.trim(),

async function saveComplete() {
  if (!completingSrc) return;
  const { type, idx } = completingSrc;
  const item = type === 'doctor' ? doctors[idx] : tests[idx];
  const date = document.getElementById('complete-date').value || new Date().toISOString().split('T')[0];

  // Update card
  if (type === 'doctor' && item._id) {
    await sb.from('doctors').update({ last_visit: date, next_visit: null }).eq('id', item._id);
  } else if (type === 'test' && item._id) {
    await sb.from('tests').update({ date, next_date: null }).eq('id', item._id);
  }

  // Add to history
  await sb.from('history').insert({
    user_id: currentUser.id,
    type, name: item.name,
    sub: type === 'doctor' ? item.spec : item.cat,
    date,
    cost: parseFloat(document.getElementById('complete-cost').value) || null,
    rating: type === 'doctor' ? completeRating : 0,
    notes: document.getElementById('complete-notes').value.trim()
  });

  await loadData();
  closeModal('complete');
  showTab('history');
  showToast('Приём записан в историю ✓');
  completingSrc = null;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function daysUntil(lastDate, freqDays) {
  if (!lastDate || !freqDays) return null;
  const next = new Date(lastDate);
  next.setDate(next.getDate() + parseInt(freqDays));
  return Math.round((next - new Date()) / 86400000);
}
function daysFromDate(dateStr) {
  if (!dateStr) return null;
  return Math.round((new Date(dateStr) - new Date()) / 86400000);
}
function getRemindDays(item, isTest) {
  if (item.next) return daysFromDate(item.next);
  if (!isTest && item.last && item.freq) return daysUntil(item.last, item.freq);
  if (isTest  && item.date && item.freq) return daysUntil(item.date, item.freq);
  return null;
}
function statusBadge(days) {
  if (days === null) return '';
  if (days < 0)  return `<span class="badge badge-urgent">Просрочено на ${Math.abs(days)} дн.</span>`;
  if (days === 0) return `<span class="badge badge-urgent">Сегодня!</span>`;
  if (days <= 30) return `<span class="badge badge-warn">Через ${days} дн.</span>`;
  return `<span class="badge badge-ok">Через ${days} дн.</span>`;
}
const freqMap = {"30":"ежемесячно","90":"раз в 3 мес.","180":"раз в полгода","365":"раз в год","730":"раз в 2 года"};
function formatDate(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}

function renderDoctors() {
  const el = document.getElementById('doctors-list');
  if (!doctors.length) { el.innerHTML = '<div class="empty"><i class="ti ti-stethoscope"></i>Врачи ещё не добавлены.<br>Нажмите «Добавить», чтобы занести первую запись.</div>'; return; }
  el.innerHTML = doctors.map((d, i) => {
    const days = getRemindDays(d, false);
    return `<div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${d.name}</div>
          <div class="card-sub">${d.spec || ''}${d.clinic ? ' · ' + d.clinic : ''}</div>
        </div>
        <div class="actions">
          <button class="btn-icon" onclick="openLogModal('doctor',${i})" title="Добавить визит в историю"><i class="ti ti-plus"></i> Визит</button>
          <button class="btn-icon" onclick="editDoctor(${i})"><i class="ti ti-edit"></i></button>
          <button class="btn-danger" onclick="deleteDoctor(${i})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      ${d.last ? `<div class="meta-row"><i class="ti ti-calendar-check" style="font-size:14px"></i> Последний визит: ${formatDate(d.last)}</div>` : ''}
      ${d.next ? `<div class="meta-row"><i class="ti ti-calendar-event" style="font-size:14px;color:var(--teal)"></i> <span style="color:var(--teal)">Запланирован: ${formatDate(d.next)}</span></div>` : ''}
      ${d.phone ? `<div class="meta-row"><i class="ti ti-phone" style="font-size:14px"></i> ${d.phone}</div>` : ''}
      ${(d.freq && !d.next) ? `<div class="meta-row" style="margin-top:8px;flex-wrap:wrap;gap:6px">${statusBadge(days)} <span style="font-size:12px;color:var(--text-sec)">Повтор ${freqMap[d.freq] || ''}</span></div>` : ''}
      ${d.next ? `<div class="meta-row" style="margin-top:8px">${statusBadge(days)}</div>` : ''}
      ${d.notes ? `<div class="card-notes">${d.notes}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTests() {
  const el = document.getElementById('tests-list');
  if (!tests.length) { el.innerHTML = '<div class="empty"><i class="ti ti-flask"></i>Анализы ещё не добавлены.<br>Нажмите «Добавить», чтобы занести первую запись.</div>'; return; }
  el.innerHTML = tests.map((t, i) => {
    const days = getRemindDays(t, true);
    return `<div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">${t.name}</div>
          <div class="card-sub"><span class="badge badge-info">${t.cat}</span></div>
        </div>
        <div class="actions">
          <button class="btn-icon" onclick="openLogModal('test',${i})" title="Добавить анализ в историю"><i class="ti ti-plus"></i> Запись</button>
          <button class="btn-icon" onclick="editTest(${i})"><i class="ti ti-edit"></i></button>
          <button class="btn-danger" onclick="deleteTest(${i})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      ${t.date ? `<div class="meta-row"><i class="ti ti-calendar-check" style="font-size:14px"></i> Сдан: ${formatDate(t.date)}</div>` : ''}
      ${t.next ? `<div class="meta-row"><i class="ti ti-calendar-event" style="font-size:14px;color:var(--teal)"></i> <span style="color:var(--teal)">Запланирован: ${formatDate(t.next)}</span></div>` : ''}
      ${t.result ? `<div class="meta-row"><i class="ti ti-report-medical" style="font-size:14px"></i> Результат: <strong>${t.result}</strong></div>` : ''}
      ${(t.freq && !t.next) ? `<div class="meta-row" style="margin-top:8px;flex-wrap:wrap;gap:6px">${statusBadge(days)} <span style="font-size:12px;color:var(--text-sec)">Повтор ${freqMap[t.freq] || ''}</span></div>` : ''}
      ${t.next ? `<div class="meta-row" style="margin-top:8px">${statusBadge(days)}</div>` : ''}
      ${t.notes ? `<div class="card-notes">${t.notes}</div>` : ''}
    </div>`;
  }).join('');
}

function renderReminders() {
  const items = [];
  doctors.forEach((d, i) => {
    const days = getRemindDays(d, false);
    if (days === null) return;
    const isPlanned = !!d.next;
    const date = d.next || (d.last && d.freq ? (() => { const dt = new Date(d.last); dt.setDate(dt.getDate() + parseInt(d.freq)); return dt.toISOString().split('T')[0]; })() : '');
    items.push({ type: 'doctor', label: d.spec, name: d.name, days, isPlanned, srcIdx: i, date, time: d.next_time || '', place: d.next_place || d.clinic || '' });
  });
  tests.forEach((t, i) => {
    const days = getRemindDays(t, true);
    if (days === null) return;
    const isPlanned = !!t.next;
    const date = t.next || (t.date && t.freq ? (() => { const dt = new Date(t.date); dt.setDate(dt.getDate() + parseInt(t.freq)); return dt.toISOString().split('T')[0]; })() : '');
    items.push({ type: 'test', label: t.cat, name: t.name, days, isPlanned, srcIdx: i, date, time: t.next_time || '', place: t.next_place || '' });
  });
  items.sort((a, b) => a.days - b.days);

  const urgent = items.filter(x => x.days < 0);
  const soon   = items.filter(x => x.days >= 0 && x.days <= 30);
  const later  = items.filter(x => x.days > 30);
  const alertCount = urgent.length + soon.filter(x => x.days <= 7).length;

  const stats = `<div class="summary-grid">
    <div class="stat-card"><div class="stat-num" style="color:${alertCount > 0 ? 'var(--red-border)' : 'var(--teal)'}">${alertCount}</div><div class="stat-label">Требуют внимания</div></div>
    <div class="stat-card"><div class="stat-num">${doctors.length}</div><div class="stat-label">Врачей</div></div>
    <div class="stat-card"><div class="stat-num">${tests.length}</div><div class="stat-label">Анализов</div></div>
  </div>`;

  const renderItem = x => {
    const iconCls = x.days < 0 ? 'ri-urgent' : (x.days <= 14 ? 'ri-soon' : 'ri-ok');
    const icon = x.type === 'doctor' ? 'ti-stethoscope' : 'ti-flask';
    const plannedBadge = x.isPlanned ? `<span style="font-size:11px;background:var(--teal-light);color:var(--teal-text);padding:1px 7px;border-radius:10px;font-weight:500">запланирован</span>` : '';
    const dateStr  = x.date  ? `<span style="display:inline-flex;align-items:center;gap:3px"><i class="ti ti-calendar" style="font-size:13px"></i>${formatDate(x.date)}</span>` : '';
    const timeStr  = x.time  ? `<span style="display:inline-flex;align-items:center;gap:3px"><i class="ti ti-clock" style="font-size:13px"></i>${x.time}</span>` : '';
    const placeStr = x.place ? `<span style="display:inline-flex;align-items:center;gap:3px"><i class="ti ti-map-pin" style="font-size:13px"></i>${x.place}</span>` : '';
    const detailRow = [dateStr, timeStr, placeStr].filter(Boolean).join('<span style="color:var(--border-med)"> · </span>');
    let daysHtml;
    if (x.days < 0)      daysHtml = `<div class="days-left" style="color:var(--red-border)">-${Math.abs(x.days)}</div><div class="days-label">дней назад</div>`;
    else if (x.days === 0) daysHtml = `<div class="days-left" style="color:var(--red-border)">!</div><div class="days-label">сегодня</div>`;
    else                 daysHtml = `<div class="days-left">${x.days}</div><div class="days-label">дней</div>`;
    return `<div class="reminder-card">
      <div class="reminder-icon ${iconCls}"><i class="ti ${icon}"></i></div>
      <div class="reminder-info">
        <div class="reminder-name">${x.name}</div>
        <div class="reminder-sub" style="margin-top:3px;display:flex;flex-wrap:wrap;align-items:center;gap:6px">
          ${x.label ? `<span>${x.label}</span>` : ''} ${plannedBadge}
        </div>
        ${detailRow ? `<div style="margin-top:6px;font-size:12px;color:var(--text-sec);display:flex;flex-wrap:wrap;gap:8px;line-height:1.6">${detailRow}</div>` : ''}
        <button class="btn-done" onclick="markDone('${x.type}',${x.srcIdx})" style="margin-top:8px">
          <i class="ti ti-circle-check"></i> Отметить выполненным
        </button>
      </div>
      <div class="days-box">${daysHtml}</div>
    </div>`;
  };

  let html = stats;
  if (!items.length) {
    html += '<div class="empty"><i class="ti ti-bell"></i>Нет записей с повторениями.<br>Добавьте врача или анализ с периодичностью.</div>';
  } else {
    if (urgent.length) html += `<div class="section-label urgent" style="margin-top:4px">Просрочено</div>` + urgent.map(renderItem).join('');
    if (soon.length)   html += `<div class="section-label soon" style="margin-top:${urgent.length ? '16px' : '0'}">В ближайшее время</div>` + soon.map(renderItem).join('');
    if (later.length)  html += `<div class="section-label" style="margin-top:${(urgent.length || soon.length) ? '16px' : '0'}">Запланировано</div>` + later.map(renderItem).join('');
  }
  document.getElementById('reminders-content').innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('history-content');
  const filtered = histFilter === 'all' ? history : history.filter(h => h.type === histFilter);
  const sorted = [...filtered].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const total = history.reduce((s, h) => s + (parseFloat(h.cost) || 0), 0);
  const totalFiltered = filtered.reduce((s, h) => s + (parseFloat(h.cost) || 0), 0);

  const starsHtml = (r, type) => {
    if (type !== 'doctor' || !r) return '';
    return '<div class="hist-stars">' + [1,2,3,4,5].map(n => `<span class="hist-star${n <= r ? '' : ' off'}">★</span>`).join('') + '</div>';
  };
  const totalBar = `<div class="total-bar">
    <span style="color:var(--text-sec)">Всего потрачено <span style="color:var(--text);font-weight:500">${history.length} записей</span></span>
    <span>${histFilter !== 'all' ? `<span style="color:var(--text-sec);font-size:12px;margin-right:4px">выборка</span> <strong>${totalFiltered.toLocaleString('ru-RU')} ₽</strong> /` : ''} <strong>${total.toLocaleString('ru-RU')} ₽</strong></span>
  </div>`;
  const filterBar = `<div class="filter-bar">
    <button class="filter-btn ${histFilter==='all'?'active':''}" onclick="setHistFilter('all')">Все</button>
    <button class="filter-btn ${histFilter==='doctor'?'active':''}" onclick="setHistFilter('doctor')">Врачи</button>
    <button class="filter-btn ${histFilter==='test'?'active':''}" onclick="setHistFilter('test')">Анализы</button>
  </div>`;

  if (!history.length) {
    el.innerHTML = filterBar + '<div class="empty"><i class="ti ti-history"></i>История пуста.<br>Добавляйте записи с карточек врачей и анализов.</div>';
    return;
  }
  const items = sorted.map((h) => {
    const i = history.indexOf(h);
    const typeBadge = h.type === 'doctor'
      ? `<span class="badge badge-info">Приём</span>`
      : `<span class="badge" style="background:var(--teal-light);color:var(--teal-text)">Анализ</span>`;
    return `<div class="hist-card">
      <div class="hist-header">
        <div style="flex:1;min-width:0">
          <div class="hist-name">${h.name}</div>
          <div class="hist-meta">${typeBadge}${h.sub ? `<span>${h.sub}</span>` : ''}${h.date ? `<span>${formatDate(h.date)}</span>` : ''}</div>
          ${starsHtml(h.rating, h.type)}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="hist-cost">${h.cost ? Number(h.cost).toLocaleString('ru-RU') + ' ₽' : 'бесплатно'}</div>
          <div style="display:flex;gap:4px">
            <button class="btn-icon" onclick="editLog(${i})" style="font-size:12px;padding:3px 7px"><i class="ti ti-edit"></i></button>
            <button class="btn-danger" onclick="deleteLog(${i})" style="padding:3px 7px"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
      ${h.notes ? `<div class="hist-note">${h.notes}</div>` : ''}
    </div>`;
  }).join('');
  el.innerHTML = filterBar + totalBar + items;
}

function setHistFilter(f) { histFilter = f; renderHistory(); }

// ── Modals ────────────────────────────────────────────────────────────────────
function showTab(name) {
  const names = ['reminders','doctors','tests','history'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
}

function openModal(type) {
  if (type === 'doctor') { editingDocIdx = null; document.getElementById('doc-modal-title').textContent = 'Добавить врача'; clearDocForm(); }
  else { editingTestIdx = null; document.getElementById('test-modal-title').textContent = 'Добавить анализ'; clearTestForm(); }
  document.getElementById('modal-' + type).classList.add('open');
}
function closeModal(type) { document.getElementById('modal-' + type).classList.remove('open'); }

function clearDocForm() {
  ['doc-name','doc-spec','doc-clinic','doc-phone','doc-last','doc-next','doc-next-time','doc-next-place','doc-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('doc-freq').value = '';
}
function clearTestForm() {
  ['test-name','test-date','test-next','test-next-time','test-next-place','test-result','test-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('test-freq').value = '';
  document.getElementById('test-cat').value = 'Анализ крови';
}

function editDoctor(i) {
  editingDocIdx = i;
  const d = doctors[i];
  document.getElementById('doc-modal-title').textContent = 'Редактировать врача';
  document.getElementById('doc-name').value       = d.name       || '';
  document.getElementById('doc-spec').value       = d.spec       || '';
  document.getElementById('doc-clinic').value     = d.clinic     || '';
  document.getElementById('doc-phone').value      = d.phone      || '';
  document.getElementById('doc-last').value       = d.last       || '';
  document.getElementById('doc-next').value       = d.next       || '';
  document.getElementById('doc-next-time').value  = d.next_time  || '';
  document.getElementById('doc-next-place').value = d.next_place || '';
  document.getElementById('doc-freq').value       = d.freq       || '';
  document.getElementById('doc-notes').value      = d.notes      || '';
  document.getElementById('modal-doctor').classList.add('open');
}

function editTest(i) {
  editingTestIdx = i;
  const t = tests[i];
  document.getElementById('test-modal-title').textContent = 'Редактировать запись';
  document.getElementById('test-name').value       = t.name       || '';
  document.getElementById('test-cat').value        = t.cat        || 'Анализ крови';
  document.getElementById('test-date').value       = t.date       || '';
  document.getElementById('test-next').value       = t.next       || '';
  document.getElementById('test-next-time').value  = t.next_time  || '';
  document.getElementById('test-next-place').value = t.next_place || '';
  document.getElementById('test-result').value     = t.result     || '';
  document.getElementById('test-freq').value       = t.freq       || '';
  document.getElementById('test-notes').value      = t.notes      || '';
  document.getElementById('modal-test').classList.add('open');
}

function openLogModal(type, idx) {
  editingLogIdx = null;
  currentRating = 0; updateStars(0);
  document.getElementById('log-modal-title').textContent = 'Добавить запись в историю';
  document.getElementById('log-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('log-cost').value = '';
  document.getElementById('log-notes').value = '';
  document.getElementById('log-custom').value = '';
  if (type) document.getElementById('log-type').value = type;
  updateLogNames();
  if (idx !== undefined) {
    const list = type === 'doctor' ? doctors : tests;
    const sel = document.getElementById('log-ref');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === String(idx)) { sel.selectedIndex = i; break; }
    }
  }
  document.getElementById('modal-log').classList.add('open');
}

function updateLogNames() {
  const type = document.getElementById('log-type').value;
  const sel = document.getElementById('log-ref');
  const ratingField = document.getElementById('log-rating-field');
  ratingField.style.display = type === 'doctor' ? '' : 'none';
  const list = type === 'doctor' ? doctors : tests;
  sel.innerHTML = list.length
    ? list.map((x, i) => `<option value="${i}">${x.name}${type==='doctor'&&x.spec?' — '+x.spec:type==='test'&&x.cat?' ('+x.cat+')':''}</option>`).join('')
    : '<option value="">— нет записей —</option>';
}

function setRating(n) { currentRating = n; updateStars(n); }
function updateStars(n) { document.querySelectorAll('#log-stars .star').forEach((s, i) => s.classList.toggle('on', i < n)); }

function editLog(i) {
  editingLogIdx = i;
  const h = history[i];
  document.getElementById('log-modal-title').textContent = 'Редактировать запись';
  document.getElementById('log-type').value = h.type;
  updateLogNames();
  document.getElementById('log-custom').value = h.name;
  document.getElementById('log-date').value = h.date || '';
  document.getElementById('log-cost').value = h.cost || '';
  document.getElementById('log-notes').value = h.notes || '';
  currentRating = h.rating || 0; updateStars(currentRating);
  document.getElementById('modal-log').classList.add('open');
}

function markDone(type, idx) {
  completingSrc = { type, idx };
  completeRating = 0; updateCompleteStars(0);
  const item = type === 'doctor' ? doctors[idx] : tests[idx];
  const sub  = type === 'doctor' ? item.spec : item.cat;
  document.getElementById('complete-title').textContent = item.name;
  document.getElementById('complete-sub').textContent   = sub || '';
  document.getElementById('complete-date').value  = new Date().toISOString().split('T')[0];
  document.getElementById('complete-cost').value  = '';
  document.getElementById('complete-notes').value = '';
  document.getElementById('complete-rating-field').style.display = type === 'doctor' ? '' : 'none';
  document.getElementById('modal-complete').classList.add('open');
}

function setCompleteRating(n) { completeRating = n; updateCompleteStars(n); }
function updateCompleteStars(n) { document.querySelectorAll('#complete-stars .star').forEach((s, i) => s.classList.toggle('on', i < n)); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Enter key in auth
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') handleAuth();
});
</script>
</body>
</html>
